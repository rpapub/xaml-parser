# Pytest configuration for xaml-parser
# https://docs.pytest.org/en/stable/reference/customize.html

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --verbose
    --cov=xaml_parser
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=90
    --strict-markers
    -m "not corpus"

markers =
    unit: unit tests (fast, no I/O, isolated)
    integration: integration tests (uses testdata files)
    corpus: corpus tests (uses test-corpus submodule, slow)
    smoke: smoke tests (basic robustness checks)
    golden: golden baseline comparison tests
    requires_corpus: tests requiring corpus data availability

# Test directory structure:
# - tests/unit/          - Fast unit tests with no file I/O
# - tests/integration/   - Integration tests using testdata/
# - tests/corpus/        - Large-scale corpus tests (test-corpus submodule)
#
# Running tests:
#   pytest tests/unit/                 # Fast unit tests only
#   pytest tests/integration/          # Integration tests
#   pytest tests/corpus/ -m corpus     # Corpus tests (slow)
#   pytest                             # All except corpus (default)
