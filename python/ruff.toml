# Ruff configuration for xaml-parser
# https://docs.astral.sh/ruff/

line-length = 100
target-version = "py311"

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "N",    # pep8-naming
    "D",    # pydocstyle
    "ANN",  # flake8-annotations
]

ignore = [
    "D203",    # one-blank-line-before-class (incompatible with D211)
    "D212",    # multi-line-summary-first-line (incompatible with D213)
    "ANN101",  # missing-type-self (deprecated)
    "ANN102",  # missing-type-cls (deprecated)
    "ANN401",  # any-type (too strict for this use case)
]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
"tests/**/*.py" = [
    "D",      # Don't require docstrings in tests
    "ANN",    # Don't require type annotations in tests
]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
